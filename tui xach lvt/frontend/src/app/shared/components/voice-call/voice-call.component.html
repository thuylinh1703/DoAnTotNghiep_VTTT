<div *ngIf="status !== 'idle'" class="fixed bottom-6 right-6 z-50 animate-fade-in">
    <!-- Calling State -->
    <div *ngIf="status === 'calling'" class="bg-gray-900 text-white rounded-2xl shadow-2xl p-6 flex flex-col items-center w-64 border border-gray-700">
        <div class="relative mb-4">
            <div class="w-20 h-20 bg-primary-500 rounded-full flex items-center justify-center animate-pulse">
                <svg class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
            </div>
        </div>
        <h3 class="text-lg font-semibold mb-1">Đang gọi...</h3>
        <p class="text-sm text-gray-400 mb-6 italic">Đang kết nối với hỗ trợ viên</p>
        <button (click)="endCall()" class="w-full bg-red-500 hover:bg-red-600 text-white font-medium py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
            Hủy cuộc gọi
        </button>
    </div>

    <!-- Incoming Call State -->
    <div *ngIf="status === 'incoming'" class="bg-gray-900 text-white rounded-2xl shadow-2xl p-6 flex flex-col items-center w-64 border border-teal-500 border-2">
        <div class="relative mb-4">
            <div class="w-20 h-20 bg-teal-500 rounded-full flex items-center justify-center animate-bounce">
                <svg class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
            </div>
        </div>
        <h3 class="text-lg font-semibold mb-1">Cuộc gọi đến</h3>
        <p class="text-sm text-gray-400 mb-6">{{ incomingFrom }}</p>
        <div class="flex gap-4 w-full">
            <button (click)="rejectCall()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-2 rounded-lg transition-all">Từ chối</button>
            <button (click)="acceptCall()" class="flex-1 bg-teal-500 hover:bg-teal-600 text-white font-medium py-2 rounded-lg transition-all shadow-lg">Trả lời</button>
        </div>
    </div>

    <!-- Active Call State -->
    <div *ngIf="status === 'active'" class="bg-gray-900 text-white rounded-2xl shadow-2xl p-6 flex flex-col items-center w-64 border border-green-500">
        <div class="flex items-center gap-3 mb-4 text-green-400">
            <span class="flex h-3 w-3 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="text-sm font-medium uppercase tracking-wider">Đang đàm thoại</span>
        </div>
        <div class="w-24 h-24 mb-6 rounded-full overflow-hidden border-2 border-gray-700 p-1">
            <div class="w-full h-full bg-gray-800 rounded-full flex items-center justify-center">
                <svg class="h-12 w-12 text-gray-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
            </div>
        </div>
        <div class="flex justify-center gap-6 w-full">
            <button class="p-3 bg-gray-800 hover:bg-gray-700 rounded-full text-white transition-colors" title="Bật/Tắt Mic">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <button (click)="endCall()" class="p-3 bg-red-500 hover:bg-red-600 rounded-full text-white shadow-lg transition-transform hover:scale-110">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.516l2.257-1.13a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z" />
                </svg>
            </button>
        </div>
    </div>
</div>

<audio #remoteAudio autoplay></audio>
