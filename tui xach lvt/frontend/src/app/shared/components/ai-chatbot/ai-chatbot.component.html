<div class="fixed bottom-8 right-8 z-[100] font-sans">
    <!-- Bubble Button -->
    <button (click)="toggleChat()" 
        class="group relative w-16 h-16 rounded-full bg-[#1d1d1f] text-white shadow-2xl flex items-center justify-center transition-all duration-300 hover:scale-105 active:scale-95 overflow-hidden">
        <div class="absolute inset-0 bg-[#0071e3] opacity-0 group-hover:opacity-10 transition-opacity"></div>
        <svg *ngIf="!isOpen" class="w-8 h-8 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
        </svg>
        <svg *ngIf="isOpen" class="w-8 h-8 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>

    <!-- Chat Window -->
    <div *ngIf="isOpen" @slideInOut
        class="absolute bottom-20 right-0 w-[400px] h-[600px] bg-white/80 backdrop-blur-xl border border-[rgba(0,0,0,0.1)] rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden origin-bottom-right">
        
        <!-- Header -->
        <div class="px-8 py-6 border-b border-[rgba(0,0,0,0.05)] bg-[rgba(255,255,255,0.4)] flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-[#0071e3] flex items-center justify-center text-white shadow-[0_4px_12px_rgba(0,113,227,0.3)]">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <div>
                <h3 class="text-[17px] font-semibold tracking-[-0.022em] text-[#1d1d1f]">AI Assistant</h3>
                <p class="text-[12px] text-[rgba(0,0,0,0.5)]">Sẵn sàng hỗ trợ bạn 24/7</p>
            </div>
        </div>

        <!-- Messages Area -->
        <div #scrollMe class="flex-1 overflow-y-auto p-6 space-y-4 scroll-smooth custom-scrollbar">
            <div *ngFor="let msg of messages" class="flex flex-col" 
                [ngClass]="msg.sender === 'user' ? 'items-end' : 'items-start'">
                <div [ngClass]="msg.sender === 'user' 
                    ? 'bg-[#0071e3] text-white rounded-t-[18px] rounded-bl-[18px] rounded-br-[4px]' 
                    : 'bg-[#ededf2] text-[#1d1d1f] rounded-t-[18px] rounded-br-[18px] rounded-bl-[4px]'"
                    class="max-w-[85%] px-4 py-3 text-[14px] leading-[1.4] shadow-sm">
                    
                    <ng-container *ngFor="let seg of msg.segments">
                        <span *ngIf="seg.type === 'text'">{{ seg.content }}</span>
                        <strong *ngIf="seg.type === 'bold'" class="font-bold text-[#1d1d1f]">{{ seg.content }}</strong>
                        <a *ngIf="seg.type === 'product'" 
                            (click)="goToProduct(seg.productId!)"
                            class="inline-flex items-center gap-1 mx-1 px-2 py-0.5 bg-white/50 rounded-lg text-[#0071e3] font-bold cursor-pointer hover:bg-white transition-colors border border-[#0071e3]/20">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                            </svg>
                            {{ seg.content }}
                        </a>
                    </ng-container>
                </div>
                <span class="text-[10px] text-[rgba(0,0,0,0.3)] mt-1 mx-1">{{ msg.timestamp | date:'HH:mm' }}</span>
            </div>

            <!-- Typing Indicator -->
            <div *ngIf="isTyping" class="flex items-center gap-1.5 p-2 bg-[#ededf2] w-fit rounded-full px-4 animate-pulse">
                <div class="w-1.5 h-1.5 bg-[rgba(0,0,0,0.3)] rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                <div class="w-1.5 h-1.5 bg-[rgba(0,0,0,0.3)] rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                <div class="w-1.5 h-1.5 bg-[rgba(0,0,0,0.3)] rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-[rgba(255,255,255,0.4)] border-t border-[rgba(0,0,0,0.05)]">
            <div class="relative flex items-center bg-[#f5f5f7] rounded-full px-4 py-2 ring-1 ring-inset ring-[rgba(0,0,0,0.05)] focus-within:ring-2 focus-within:ring-[#0071e3]/30 transition-shadow">
                <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()"
                    placeholder="Nhập tin nhắn..." 
                    class="flex-1 bg-transparent border-none outline-none text-[14px] h-8 text-[#1d1d1f] placeholder-[rgba(0,0,0,0.3)]">
                <button (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping"
                    class="ml-2 w-8 h-8 rounded-full bg-[#0071e3] text-white flex items-center justify-center transition-all disabled:opacity-30 active:scale-90">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
