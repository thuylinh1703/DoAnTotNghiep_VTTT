<div class="bg-white pt-5">
    <div class="container py-5">
        <div class="row g-5">
            <!-- Sidebar -->
            <aside class="col-lg-3">
                <div class="sticky-top" style="top: 100px;">
                    <div class="card border-0 bg-light p-4 mb-4 text-center rounded-0">
                        <div *ngIf="user" class="mb-3">
                            <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center display-font fs-3 mb-3 mx-auto shadow-sm" style="width: 80px; height: 80px;">
                                {{ user.fullName.charAt(0) }}
                            </div>
                            <h3 class="display-font fs-5 mb-1 text-dark">{{ user.fullName }}</h3>
                            <p class="text-muted small text-uppercase tracking-widest mb-0" style="font-size: 0.6rem;">THÀNH VIÊN LVT HERITAGE</p>
                        </div>
                    </div>

                    <div class="list-group list-group-flush border shadow-sm rounded-0">
                        <a routerLink="/account/profile" routerLinkActive="active"
                           class="list-group-item list-group-item-action border-0 py-3 d-flex align-items-center gap-3 text-uppercase letter-spacing-wide small fw-bold"
                           [routerLinkActiveOptions]="{exact: true}">
                            <i class="bi bi-person fs-5"></i> Thông tin tài khoản
                        </a>
                        <a routerLink="/account/orders" routerLinkActive="active"
                           class="list-group-item list-group-item-action border-0 py-3 d-flex align-items-center gap-3 text-uppercase letter-spacing-wide small fw-bold">
                            <i class="bi bi-bag-check fs-5"></i> Lịch sử đơn hàng
                        </a>
                        <button (click)="logout()"
                                class="list-group-item list-group-item-action border-0 py-3 d-flex align-items-center gap-3 text-danger text-uppercase letter-spacing-wide small fw-bold">
                            <i class="bi bi-box-arrow-right fs-5"></i> Đăng xuất
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="col-lg-9">
                <div class="ps-lg-4">
                    <div class="mb-5 pb-2 border-bottom">
                        <h1 class="display-font fs-2 mb-2">Hồ Sơ Cá Nhân</h1>
                        <p class="text-muted mb-0">Quản lý và bảo mật thông tin tài khoản của bạn.</p>
                    </div>

                    <div *ngIf="loading && !user" class="d-flex justify-content-center py-5">
                        <div class="spinner-border text-gold" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-0 bg-light p-4 p-md-5" *ngIf="user">
                        <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="row g-4">
                            <div class="col-12">
                                <label class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.65rem;">Địa chỉ Email (Không thể thay đổi)</label>
                                <input type="text" formControlName="email" class="form-control border-0 bg-white bg-opacity-50 text-muted rounded-0 py-3" readonly>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.65rem;">Họ và tên</label>
                                <input type="text" formControlName="fullName" class="form-control border-0 bg-white rounded-0 shadow-none py-3">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.65rem;">Số điện thoại</label>
                                <input type="tel" formControlName="phone" class="form-control border-0 bg-white rounded-0 shadow-none py-3">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.65rem;">Địa chỉ mặc định</label>
                                <textarea formControlName="address" class="form-control border-0 bg-white rounded-0 shadow-none py-3" style="min-height: 100px;"></textarea>
                            </div>
                            
                            <div class="col-12 pt-3">
                                <button type="submit" [disabled]="loading || profileForm.invalid"
                                        class="btn btn-dark rounded-0 px-5 py-3 text-uppercase letter-spacing-wide fw-bold shadow-sm">
                                    {{ loading ? 'Đang cập nhật...' : 'Lưu Thay Đổi' }}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .list-group-item.active {
        background-color: var(--lvt-bg-dark);
        color: var(--lvt-accent);
        border-color: var(--lvt-bg-dark);
    }
    .list-group-item {
        color: #6c757d;
        background-color: #fff;
    }
    .list-group-item:hover:not(.active) {
        background-color: #f8f9fa;
        color: #111;
    }
    .letter-spacing-wide { letter-spacing: 1.5px; }
</style>
