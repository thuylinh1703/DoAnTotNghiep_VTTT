<div class="space-y-4">
	<div class="flex items-center justify-between gap-3 flex-wrap">
		<h3 class="text-[20px] font-semibold tracking-[-0.022em] text-[#1d1d1f]">Đánh giá từ khách hàng</h3>
		<select
			[value]="sort"
			(change)="onSortChange($any($event.target).value)"
			class="h-9 px-3 rounded-lg border border-[#d2d2d7] bg-white text-[13px] text-[#1d1d1f]">
			<option value="createdAt,desc">Mới nhất</option>
			<option value="rating,desc">Sao cao đến thấp</option>
			<option value="rating,asc">Sao thấp đến cao</option>
		</select>
	</div>

	<div *ngIf="loading && reviews.length === 0" class="text-[14px] text-[rgba(0,0,0,0.56)]">
		Đang tải đánh giá...
	</div>

	<div *ngIf="!loading && reviews.length === 0" class="rounded-xl border border-dashed border-[#d2d2d7] p-6 text-center text-[14px] text-[rgba(0,0,0,0.56)]">
		Chưa có đánh giá nào cho sản phẩm này.
	</div>

	<div class="space-y-3" *ngIf="reviews.length > 0">
		<app-review-card *ngFor="let review of reviews" [review]="review"></app-review-card>
	</div>

	<div *ngIf="hasMore" class="pt-2">
		<button
			type="button"
			(click)="loadMore()"
			[disabled]="loading"
			class="h-10 px-4 rounded-lg border border-[#d2d2d7] text-[14px] text-[#1d1d1f] hover:bg-[#f5f5f7] transition-colors disabled:opacity-50">
			{{ loading ? 'Đang tải...' : 'Xem thêm đánh giá' }}
		</button>
	</div>
</div>
