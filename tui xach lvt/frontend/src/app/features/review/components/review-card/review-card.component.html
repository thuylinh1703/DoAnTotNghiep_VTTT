<article class="rounded-xl border border-[#e5e5ea] p-4 bg-white">
  <div class="flex items-start justify-between gap-4">
    <div>
      <div class="flex items-center gap-2">
        <p class="text-[14px] font-semibold text-[#1d1d1f]">{{ review.userName }}</p>
        <span *ngIf="review.verifiedPurchase" class="text-[11px] px-2 py-0.5 rounded-full bg-[#e8f4ff] text-[#0066cc]">✓ Đã mua</span>
      </div>
      <div class="mt-1 flex items-center gap-0.5">
        <span *ngFor="let star of stars" [class.text-[#ff9f0a]]="star <= review.rating" [class.text-[#d2d2d7]]="star > review.rating">★</span>
      </div>
    </div>
    <time class="text-[12px] text-[rgba(0,0,0,0.56)]">{{ review.createdAt | date:'dd/MM/yyyy' }}</time>
  </div>

  <p class="mt-3 text-[14px] leading-[1.5] text-[rgba(0,0,0,0.82)] whitespace-pre-line">{{ review.comment }}</p>

  <div *ngIf="review.images?.length" class="mt-3 flex gap-2 overflow-x-auto">
    <img
      *ngFor="let image of review.images"
      [src]="image"
      alt="review image"
      class="w-16 h-16 rounded-lg object-cover border border-[#e5e5ea]" />
  </div>
</article>
