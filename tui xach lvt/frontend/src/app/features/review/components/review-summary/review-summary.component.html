<div class="rounded-2xl border border-[#d2d2d7] bg-[#fafafc] p-5" *ngIf="summary">
  <div class="flex items-start gap-6 flex-wrap">
    <div>
      <p class="text-[40px] leading-none font-semibold text-[#1d1d1f]">{{ summary.averageRating | number:'1.1-1' }}</p>
      <p class="mt-2 text-[13px] text-[rgba(0,0,0,0.56)]">{{ summary.totalCount }} đánh giá</p>
    </div>

    <div class="flex-1 min-w-[220px] space-y-2">
      <div *ngFor="let star of stars" class="flex items-center gap-3">
        <span class="w-8 text-[13px] text-[#1d1d1f]">{{ star }} ★</span>
        <div class="flex-1 h-2 bg-[#e5e5ea] rounded-full overflow-hidden">
          <div class="h-full bg-[#ff9f0a]" [style.width.%]="getPercent(star)"></div>
        </div>
        <span class="w-16 text-[12px] text-[rgba(0,0,0,0.56)] text-right">{{ getCount(star) }}</span>
      </div>
    </div>
  </div>
</div>
