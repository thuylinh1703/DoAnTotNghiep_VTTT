<div class="space-y-8 w-full">
    <div>
        <h1 class="text-section text-[#1d1d1f]">Quản lý đánh giá</h1>
        <p class="text-[14px] tracking-[-0.224px] text-[rgba(0,0,0,0.56)] mt-2">Duyệt phản hồi khách hàng và quản lý hiển thị trên trang chủ.</p>
    </div>

    <div class="card-apple overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#f5f5f7] border-b border-[#d2d2d7]">
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Người dùng</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Sản phẩm</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Đánh giá</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Nội dung</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Hiển thị</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium text-right">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-[#d2d2d7]">
                    <tr *ngFor="let review of reviews" class="hover:bg-[#f5f5f7]/50 transition-colors">
                        <td class="px-6 py-4">
                            <span class="text-[14px] font-semibold tracking-[-0.224px] text-[#1d1d1f]">{{ review.userName }}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.8)] truncate max-w-[150px] block">{{ review.productName }}</span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex text-gold">
                                <i *ngFor="let s of [1,2,3,4,5]" class="bi" [ngClass]="s <= review.rating ? 'bi-star-fill' : 'bi-star'"></i>
                            </div>
                        </td>
                        <td class="px-6 py-4">
                            <p class="text-[13px] tracking-[-0.208px] text-[rgba(0,0,0,0.8)] max-w-[300px] line-clamp-2 mb-0">{{ review.comment }}</p>
                            <span class="text-[10px] text-[rgba(0,0,0,0.4)]">{{ review.createdAt | date:'dd/MM/yyyy HH:mm' }}</span>
                        </td>
                        <td class="px-6 py-4">
                            <label class="flex items-center cursor-pointer group w-fit">
                                <div class="relative">
                                    <input type="checkbox" class="sr-only" [checked]="review.active !== false" (change)="toggleReviewStatus(review.id)">
                                    <div class="w-10 h-6 rounded-full transition-colors"
                                         [ngClass]="review.active !== false ? 'bg-[#30d158]' : 'bg-[#d2d2d7]'"></div>
                                    <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform"
                                         [ngClass]="review.active !== false ? 'translate-x-4' : ''"></div>
                                </div>
                            </label>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button (click)="deleteReview(review.id)" 
                                class="w-8 h-8 flex items-center justify-center ml-auto rounded-lg text-[#ff3b30] hover:bg-[#fff1f0] transition-colors" title="Xóa">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </td>
                    </tr>
                    <tr *ngIf="reviews.length === 0 && !loading">
                        <td colspan="6" class="px-6 py-12 text-center text-[14px] tracking-[-0.224px] text-[rgba(0,0,0,0.56)]">Chưa có đánh giá nào.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
