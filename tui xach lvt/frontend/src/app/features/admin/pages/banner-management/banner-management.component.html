<div class="space-y-8 w-full">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-section text-[#1d1d1f]">Quản lý Banner</h1>
            <p class="text-[14px] tracking-[-0.224px] text-[rgba(0,0,0,0.56)] mt-2">Quản lý các banner quảng cáo trên trang chủ.</p>
        </div>
        <button (click)="openAddModal()" class="btn-add-luxury h-10 px-5 inline-flex items-center gap-2 text-[14px] tracking-[-0.224px]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            Thêm banner
        </button>
    </div>

    <!-- Table Card -->
    <div class="card-apple overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-[#f5f5f7] border-b border-[#d2d2d7]">
                    <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium w-28">Hình ảnh</th>
                    <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Tiêu đề</th>
                    <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Thứ tự</th>
                    <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium text-right">Thao tác</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-[#d2d2d7]">
                <tr *ngFor="let banner of banners" class="hover:bg-[#f5f5f7]/50 transition-colors">
                    <td class="px-6 py-4">
                        <img [src]="getImageUrl(banner.imageUrl)" class="w-20 h-10 object-cover rounded-lg bg-[#f5f5f7]" [alt]="banner.title">
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex flex-col">
                            <span class="text-[14px] font-semibold tracking-[-0.224px] text-[#1d1d1f]">{{ banner.title }}</span>
                            <span class="text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)] truncate max-w-xs mt-0.5">{{ banner.linkUrl }}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)]">{{ banner.displayOrder }}</td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex justify-end gap-2">
                            <button (click)="openEditModal(banner)"
                                class="w-8 h-8 flex items-center justify-center rounded-lg text-[#1d1d1f] hover:bg-[#f5f5f7] transition-colors" aria-label="Sửa">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                </svg>
                            </button>
                            <button (click)="deleteBanner(banner.id)"
                                class="w-8 h-8 flex items-center justify-center rounded-lg text-[#ff3b30] hover:bg-[#fff1f0] transition-colors" aria-label="Xóa">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="!loading && banners.length === 0">
                    <td colspan="4" class="px-6 py-12 text-center text-[14px] tracking-[-0.224px] text-[rgba(0,0,0,0.56)]">Chưa có banner nào.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto"
         style="box-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;">
        <div class="p-8">
            <h2 class="text-card-title text-[#1d1d1f] mb-6">{{ editMode ? 'Cập nhật banner' : 'Thêm banner mới' }}</h2>

            <form [formGroup]="bannerForm" (ngSubmit)="onSubmit()" class="space-y-5">
                <div>
                    <label class="block text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)] mb-2">Tiêu đề *</label>
                    <input type="text" formControlName="title" class="input-plain" placeholder="Nhập tiêu đề banner">
                </div>

                <!-- Main Image Upload -->
                <div>
                    <label class="block text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)] mb-2">Hình ảnh chính *</label>
                    <div class="flex flex-col gap-3">
                        <div (click)="mainFileInput.click()"
                            class="cursor-pointer group relative aspect-video w-full bg-[#f5f5f7] rounded-xl overflow-hidden flex flex-col items-center justify-center hover:bg-[#ededf2] transition-colors">
                            <img *ngIf="mainPreview || bannerForm.get('imageUrl')?.value" 
                                 [src]="getImageUrl(mainPreview || bannerForm.get('imageUrl')?.value)" 
                                 class="absolute inset-0 w-full h-full object-cover">
                            <div *ngIf="!mainPreview && !bannerForm.get('imageUrl')?.value" class="flex flex-col items-center gap-2 text-[rgba(0,0,0,0.56)]">
                                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                <span class="text-[12px] tracking-[-0.12px]">Tải ảnh chính lên</span>
                            </div>
                            <div *ngIf="mainPreview || bannerForm.get('imageUrl')?.value" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="text-[12px] tracking-[-0.12px] text-white">Thay đổi ảnh</span>
                            </div>
                        </div>
                        <input #mainFileInput type="file" (change)="onMainFileSelected($event)" class="hidden" accept="image/*">
                        <input type="text" formControlName="imageUrl" class="input-plain" placeholder="Hoặc nhập URL thủ công">
                    </div>
                </div>

                <!-- Sub Image Upload -->
                <div>
                    <label class="block text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)] mb-2">Hình ảnh phụ (Floating)</label>
                    <div class="flex flex-col gap-3">
                        <div (click)="subFileInput.click()"
                            class="cursor-pointer group relative aspect-video w-48 bg-[#f5f5f7] rounded-xl overflow-hidden flex flex-col items-center justify-center hover:bg-[#ededf2] transition-colors">
                            <img *ngIf="subPreview || bannerForm.get('subImageUrl')?.value" 
                                 [src]="getImageUrl(subPreview || bannerForm.get('subImageUrl')?.value)" 
                                 class="absolute inset-0 w-full h-full object-cover">
                            <div *ngIf="!subPreview && !bannerForm.get('subImageUrl')?.value" class="flex flex-col items-center gap-2 text-[rgba(0,0,0,0.56)]">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <span class="text-[12px] tracking-[-0.12px]">Tải ảnh phụ</span>
                            </div>
                            <div *ngIf="subPreview || bannerForm.get('subImageUrl')?.value" class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="text-[12px] tracking-[-0.12px] text-white">Thay đổi</span>
                            </div>
                        </div>
                        <input #subFileInput type="file" (change)="onSubFileSelected($event)" class="hidden" accept="image/*">
                        <input type="text" formControlName="subImageUrl" class="input-plain" placeholder="Hoặc nhập URL thủ công">
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)] mb-2">URL liên kết</label>
                    <input type="text" formControlName="linkUrl" class="input-plain" placeholder="/products/1">
                </div>

                <div class="flex gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.56)] mb-2">Thứ tự hiển thị</label>
                        <input type="number" formControlName="displayOrder" class="input-plain">
                    </div>
                    <div class="flex-1 pb-2">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" formControlName="active" class="sr-only">
                                <div class="w-10 h-6 rounded-full transition-colors"
                                     [ngClass]="bannerForm.get('active')?.value ? 'bg-[#30d158]' : 'bg-[#d2d2d7]'"></div>
                                <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform"
                                     [ngClass]="bannerForm.get('active')?.value ? 'translate-x-4' : ''"></div>
                            </div>
                            <span class="text-[14px] tracking-[-0.224px] text-[#1d1d1f]">Hoạt động</span>
                        </label>
                    </div>
                </div>

                <div class="pt-4 flex gap-3">
                    <button type="button" (click)="closeModal()" class="btn-outline flex-1 h-10 text-[14px] focus-ring">Hủy</button>
                    <button type="submit" [disabled]="loading || bannerForm.invalid"
                        class="btn-primary flex-1 h-10 text-[14px] disabled:opacity-50 focus-ring">
                        {{ loading ? 'Đang lưu…' : 'Lưu lại' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
