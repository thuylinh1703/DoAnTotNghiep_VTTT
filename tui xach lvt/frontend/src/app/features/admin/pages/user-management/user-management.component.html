<div class="space-y-8 w-full">
    <div>
        <h1 class="text-section text-[#1d1d1f]">Quản lý khách hàng</h1>
        <p class="text-[14px] tracking-[-0.224px] text-[rgba(0,0,0,0.56)] mt-2">Danh sách người dùng đăng ký tài khoản trên hệ thống.</p>
    </div>

    <div class="card-apple overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#f5f5f7] border-b border-[#d2d2d7]">
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Thông tin</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Email</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium">Số điện thoại</th>
                        <th class="px-6 py-3 text-[10px] uppercase tracking-[0.1em] text-[rgba(0,0,0,0.56)] font-medium text-right">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-[#d2d2d7]">
                    <tr *ngFor="let user of users" class="hover:bg-[#f5f5f7]/50 transition-colors">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full bg-[#1d1d1f] text-white flex items-center justify-center text-[13px] font-semibold">
                                    {{ (user.fullName || 'U').charAt(0) }}
                                </div>
                                <span class="text-[14px] font-semibold tracking-[-0.224px] text-[#1d1d1f]">{{ user.fullName }}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.8)]">{{ user.email }}</td>
                        <td class="px-6 py-4 text-[12px] tracking-[-0.12px] text-[rgba(0,0,0,0.8)]">{{ user.phone }}</td>
                        <td class="px-6 py-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button (click)="openEdit(user)" title="Chỉnh sửa"
                                    class="w-8 h-8 flex items-center justify-center rounded-lg text-[#1d1d1f] hover:bg-[#f5f5f7] transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                    </svg>
                                </button>
                                <button *ngIf="user.id !== currentUserId" (click)="toggleStatus(user.id)" [title]="user.active ? 'Khóa tài khoản' : 'Mở khóa'"
                                    class="w-8 h-8 flex items-center justify-center rounded-lg text-[#1d1d1f] hover:bg-[#f5f5f7] transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                    </svg>
                                </button>
                                <button *ngIf="user.id !== currentUserId" (click)="deleteUser(user.id)" title="Xóa"
                                    class="w-8 h-8 flex items-center justify-center rounded-lg text-[#ff3b30] hover:bg-[#fff1f0] transition-colors">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- User Edit Modal -->
<div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl w-full max-w-lg"
         style="box-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0px;">
        <div class="p-8">
            <h2 class="text-card-title text-[#1d1d1f] mb-6">Chỉnh sửa thông tin khách hàng</h2>
            
            <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="space-y-4">
                <div>
                    <label class="block text-[12px] text-[rgba(0,0,0,0.56)] mb-2">Họ và tên *</label>
                    <input type="text" formControlName="fullName" class="input-plain">
                </div>
                <div>
                    <label class="block text-[12px] text-[rgba(0,0,0,0.56)] mb-2">Email *</label>
                    <input type="email" formControlName="email" class="input-plain">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[12px] text-[rgba(0,0,0,0.56)] mb-2">Số điện thoại</label>
                        <input type="text" formControlName="phone" class="input-plain">
                    </div>
                    <div>
                        <label class="block text-[12px] text-[rgba(0,0,0,0.56)] mb-2">Trạng thái</label>
                        <div class="pt-2">
                            <span [ngClass]="selectedUser?.active ? 'bg-[#e9f7ef] text-[#2a7f3f]' : 'bg-[#fff1f0] text-[#ff3b30]'"
                                class="text-[10px] tracking-[-0.08px] px-2 py-0.5 rounded">
                                {{ selectedUser?.active ? 'Đang hoạt động' : 'Bị khóa' }}
                            </span>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-[12px] text-[rgba(0,0,0,0.56)] mb-2">Địa chỉ</label>
                    <textarea formControlName="address" class="input-plain min-h-[80px]"></textarea>
                </div>

                <div class="pt-6 flex gap-3">
                    <button type="button" (click)="closeModal()" class="btn-outline flex-1 h-10 text-[14px]">Hủy</button>
                    <button type="submit" [disabled]="loading || userForm.invalid"
                        class="btn-primary flex-1 h-10 text-[14px] disabled:opacity-50">
                        {{ loading ? 'Đang lưu…' : 'Lưu thay đổi' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
