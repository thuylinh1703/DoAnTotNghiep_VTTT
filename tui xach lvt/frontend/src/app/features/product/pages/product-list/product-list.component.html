<div class="bg-white pt-5">
    <div class="container py-5">
        <!-- Header -->
        <div class="text-center mb-5 pb-3">
            <h1 class="display-font fs-1 mb-2">Bộ Sưu Tập</h1>
            <p class="text-muted letter-spacing-wide text-uppercase" style="font-size: 0.75rem;">
                {{ totalElements }} sản phẩm được tuyển chọn dành riêng cho bạn
            </p>
        </div>

        <div class="row g-5">
            <!-- Sidebar / Filters -->
            <aside class="col-lg-3 d-none d-lg-block">
                <div class="sticky-top" style="top: 100px; z-index: 10;">
                    <app-filter-sidebar
                        [initialCategoryId]="activeFilters.categoryId"
                        (filterChanged)="onFilterChange($event)"></app-filter-sidebar>
                </div>
            </aside>

            <!-- Main Content -->
            <div class="col-lg-9">
                <!-- Filters & Sorting Toolbar -->
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-4 mb-5 pb-4 border-bottom">
                    <!-- Period filters -->
                    <div class="d-flex flex-wrap gap-2">
                        <button *ngFor="let opt of periodOptions"
                                (click)="setPeriod(opt.value)"
                                class="btn btn-sm px-4 rounded-0 text-uppercase letter-spacing-wide transition-all"
                                [ngClass]="period === opt.value ? 'btn-dark' : 'btn-outline-secondary'"
                                style="font-size: 0.7rem; font-weight: 600;">
                            {{ opt.label }}
                        </button>
                    </div>

                    <!-- Sort dropdown -->
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-muted small text-uppercase tracking-widest fw-bold" style="font-size: 0.65rem;">Sắp xếp:</span>
                        <select (change)="onSortChange($event)"
                                class="form-select form-select-sm border-0 bg-light rounded-0 shadow-none px-3 py-2"
                                style="width: 180px; font-size: 0.85rem;">
                            <option>Mới nhất</option>
                            <option>Giá thấp → cao</option>
                            <option>Giá cao → thấp</option>
                            <option>Bán chạy nhất</option>
                        </select>
                    </div>
                </div>

                <!-- Product Grid -->
                <div class="row g-4" *ngIf="!loading">
                    <div *ngFor="let product of products" class="col-6 col-md-4">
                        <app-product-card [product]="product" (addToCart)="addToCart($event)"></app-product-card>
                    </div>
                </div>

                <!-- Loading skeleton -->
                <div class="row g-4" *ngIf="loading">
                    <div *ngFor="let i of [1,2,3,4,5,6]" class="col-6 col-md-4">
                        <div class="bg-light animate-pulse rounded-0" style="aspect-ratio: 1/1.5;"></div>
                    </div>
                </div>

                <!-- Empty state -->
                <div class="py-5 my-5 text-center" *ngIf="!loading && products.length === 0">
                    <i class="bi bi-search display-1 text-muted opacity-20 mb-4 d-block"></i>
                    <h3 class="display-font">Không tìm thấy sản phẩm</h3>
                    <p class="text-muted">Hãy thử điều chỉnh bộ lọc để tìm thấy món đồ ưng ý.</p>
                    <button class="btn btn-outline-dark rounded-0 mt-3" (click)="resetFilters()">Xóa tất cả bộ lọc</button>
                </div>

                <!-- Pagination -->
                <nav *ngIf="totalPages > 1" class="mt-5 pt-5 d-flex justify-content-center">
                    <ul class="pagination pagination-sm gap-2">
                        <li class="page-item" [class.disabled]="currentPage === 0">
                            <a class="page-link border-0 bg-light rounded-circle p-0 d-flex align-items-center justify-content-center" 
                               style="width: 40px; height: 40px;" (click)="onPageChange(currentPage - 1)">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <ng-container *ngFor="let page of getPages()">
                            <li class="page-item" *ngIf="!page.isEllipsis" [class.active]="currentPage === page.value">
                                <a class="page-link border-0 rounded-circle p-0 d-flex align-items-center justify-content-center transition-all" 
                                   style="width: 40px; height: 40px;"
                                   [ngClass]="currentPage === page.value ? 'bg-dark text-white' : 'bg-light text-dark'"
                                   (click)="onPageChange(page.value)">
                                    {{ page.label }}
                                </a>
                            </li>
                            <li class="page-item disabled" *ngIf="page.isEllipsis">
                                <span class="page-link border-0 bg-transparent text-muted">...</span>
                            </li>
                        </ng-container>

                        <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
                            <a class="page-link border-0 bg-light rounded-circle p-0 d-flex align-items-center justify-content-center" 
                               style="width: 40px; height: 40px;" (click)="onPageChange(currentPage + 1)">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<app-ai-suggestion [keyword]="keyword"></app-ai-suggestion>

<style>
    .animate-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: .5; }
    }
</style>
