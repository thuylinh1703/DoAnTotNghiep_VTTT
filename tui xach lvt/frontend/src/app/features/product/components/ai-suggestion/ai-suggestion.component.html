<div class="ai-suggestion-container">
  <!-- Floating Button -->
  <button class="ai-fab" (click)="toggle()" [class.active]="isOpen" [attr.aria-label]="'AI Gợi ý'">
    <i class="fas fa-robot"></i>
    <span class="pulse" *ngIf="!isOpen && suggestions.length > 0"></span>
  </button>

  <!-- Side Panel -->
  <div class="ai-panel" *ngIf="isOpen" @slideInOut>
    <div class="header">
      <h3><i class="fas fa-sparkles"></i> AI Gợi ý sản phẩm</h3>
      <button class="close-btn" (click)="toggle()" aria-label="Đóng">&times;</button>
    </div>

    <div class="content">
      <div class="loading-state" *ngIf="loading">
        <div class="typing-indicator">
          <span></span><span></span><span></span>
        </div>
        <p>AI đang tìm kiếm sản phẩm phù hợp…</p>
      </div>

      <div class="empty-state" *ngIf="!loading && suggestions.length === 0">
        <p>Không tìm thấy gợi ý cho "{{ keyword || 'bạn' }}". Hãy thử từ khóa khác.</p>
      </div>

      <div class="suggestion-list" *ngIf="!loading && suggestions.length > 0">
        <p class="intro">Dựa trên tìm kiếm của bạn, gợi ý cho bạn:</p>
        <div class="suggestion-item" *ngFor="let item of suggestions">
          <div class="item-title">{{ item.name }}</div>
          <div class="item-reason">{{ item.reason }}</div>
          <a [routerLink]="['/products', item.id]" class="view-btn">
            Xem chi tiết <span aria-hidden="true">&gt;</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
