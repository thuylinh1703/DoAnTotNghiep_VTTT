<div class="luxury-card card h-100 shadow-sm border-0 transition-all" [routerLink]="['/products', product?.id]" role="link" tabindex="0">
    <div class="position-relative overflow-hidden aspect-ratio-1x1 bg-white">
        <span *ngIf="product?.isNew" class="position-absolute top-0 start-0 m-2 z-1 badge badge-luxury">MỚI</span>
        <span *ngIf="product?.discountPrice" class="position-absolute top-0 end-0 m-2 z-1 badge bg-danger rounded-0">GIẢM GIÁ</span>

        <img *ngIf="product?.primaryImage || product?.imageUrl" 
             [src]="getImageUrl(product.primaryImage || product.imageUrl)" 
             [alt]="product.name"
             class="card-img-top w-100 h-100 object-cover">

        <div *ngIf="!(product?.primaryImage || product?.imageUrl)"
             class="w-100 h-100 d-flex align-items-center justify-content-center text-muted opacity-20">
            <i class="bi bi-image fs-1"></i>
        </div>
        
        <!-- Hover Quick Actions -->
        <div class="card-overlay position-absolute bottom-0 start-0 w-100 p-3 bg-white bg-opacity-90 d-flex gap-2 transform translate-y-100 transition-all group-hover-translate-y-0">
            <button (click)="onAddToCart($event)" class="btn btn-primary btn-sm flex-grow-1 py-2">MUA NGAY</button>
            <a [routerLink]="['/products', product?.id]" class="btn btn-outline-dark btn-sm px-3 py-2"><i class="bi bi-eye"></i></a>
        </div>
    </div>

    <div class="card-body px-3 pt-3 pb-4">
        <p class="text-muted small text-uppercase tracking-widest mb-1" style="font-size: 0.65rem;">{{ product?.brand || 'LVT Heritage' }}</p>
        <h5 class="card-title fs-6 display-font mb-2 text-truncate-2">
            <a [routerLink]="['/products', product?.id]" class="text-dark text-decoration-none">{{ product?.name }}</a>
        </h5>

        <div class="d-flex align-items-center gap-1 mb-3">
            <div class="text-gold" style="font-size: 0.75rem;">
                <i class="bi bi-star-fill me-1" *ngFor="let s of [1,2,3,4,5]"></i>
            </div>
            <span class="text-muted small">({{ product?.rating || '4.8' }})</span>
        </div>

        <div class="mt-auto">
            <span *ngIf="product?.discountPrice; else regularPrice">
                <span class="fs-5 fw-bold text-dark">{{ product?.discountPrice | number:'1.0-0' }}&#8363;</span>
                <span class="text-muted text-decoration-line-through small ms-2">{{ product?.price | number:'1.0-0' }}&#8363;</span>
            </span>
            <ng-template #regularPrice>
                <span class="fs-5 fw-bold text-dark">{{ product?.price | number:'1.0-0' }}&#8363;</span>
            </ng-template>
        </div>
    </div>
</div>

<style>
    .text-truncate-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        height: 2.5rem;
    }
    .aspect-ratio-1x1 { aspect-ratio: 1 / 1; }
    .group-hover-translate-y-0 { transform: translateY(0); }
    .transform { transition: transform 0.3s ease; }
    .translate-y-100 { transform: translateY(100%); }
    .luxury-card:hover .card-overlay { transform: translateY(0); }
</style>
