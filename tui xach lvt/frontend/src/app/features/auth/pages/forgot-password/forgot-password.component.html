<div class="auth-wrapper py-5 min-vh-100 d-flex align-items-center bg-light bg-opacity-50">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="card border-0 shadow-lg rounded-0 overflow-hidden">
                    <div class="card-header bg-dark text-white text-center py-5 border-0">
                        <h1 class="display-font fs-2 mb-0">Quên Mật Khẩu</h1>
                        <p class="text-muted small text-uppercase tracking-widest mt-2 mb-0" style="font-size: 0.65rem;">Lấy lại quyền truy cập tài khoản</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <p class="text-muted small text-center mb-4">Vui lòng nhập địa chỉ email của bạn. Chúng tôi sẽ gửi một mã xác thực để bạn có thể đặt lại mật khẩu mới.</p>
                        
                        <form class="row g-3">
                            <div class="col-12">
                                <label class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.65rem;">Địa chỉ Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 rounded-0"><i class="bi bi-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0 rounded-0 py-3 shadow-none" placeholder="example@email.com">
                                </div>
                            </div>
                            
                            <div class="col-12 pt-2">
                                <button type="submit" class="btn btn-dark w-100 rounded-0 py-3 text-uppercase letter-spacing-wide fw-bold shadow-sm">
                                    GỬI MÃ XÁC THỰC
                                </button>
                            </div>
                            
                            <div class="col-12 text-center mt-4">
                                <p class="text-muted small mb-0">
                                    Bạn đã nhớ mật khẩu? 
                                    <a routerLink="/login" class="text-gold fw-bold text-decoration-none border-bottom border-gold">Đăng nhập ngay</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a routerLink="/" class="text-muted small text-uppercase tracking-widest text-decoration-none fw-bold">
                        <i class="bi bi-arrow-left me-1"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .letter-spacing-wide { letter-spacing: 2px; }
    .text-gold { color: var(--lvt-accent); }
    .border-gold { border-color: var(--lvt-accent) !important; }
</style>
