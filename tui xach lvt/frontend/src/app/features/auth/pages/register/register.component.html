<section class="bg-light d-flex align-items-center justify-content-center py-5" style="min-height: 80vh;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card border-0 shadow-sm p-4 p-md-5 rounded-0">
                    <div class="text-center mb-5">
                        <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 48px; height: 48px; font-size: 20px; font-weight: 700;">L</div>
                        <h1 class="display-font fs-2 mb-2">Tạo Tài Khoản</h1>
                        <p class="text-muted small letter-spacing-wide text-uppercase">Gia nhập cộng đồng LVT Heritage</p>
                    </div>

                    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                        <div *ngIf="errorMessage" class="alert alert-danger border-0 rounded-0 small mb-4">
                            <i class="bi bi-exclamation-triangle me-2"></i> {{ errorMessage }}
                        </div>
                        <div *ngIf="successMessage" class="alert alert-success border-0 rounded-0 small mb-4">
                            <i class="bi bi-check-circle me-2"></i> {{ successMessage }}
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="fullname" class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.7rem;">Họ và tên</label>
                                <input id="fullname" formControlName="fullName" type="text" 
                                       class="form-control border-0 bg-light rounded-0 shadow-none fs-6" 
                                       placeholder="Nguyễn Văn A" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email-address" class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.7rem;">Địa chỉ Email</label>
                                <input id="email-address" formControlName="email" type="email" 
                                       class="form-control border-0 bg-light rounded-0 shadow-none fs-6" 
                                       placeholder="example@gmail.com" required>
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="phone" class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.7rem;">Số điện thoại</label>
                                <input id="phone" formControlName="phone" type="tel" 
                                       class="form-control border-0 bg-light rounded-0 shadow-none fs-6" 
                                       placeholder="0123 456 789" required>
                            </div>
                            <div class="col-md-6">
                                <label for="password" class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.7rem;">Mật khẩu</label>
                                <input id="password" formControlName="password" type="password" 
                                       class="form-control border-0 bg-light rounded-0 shadow-none fs-6" 
                                       placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="address" class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.7rem;">Địa chỉ giao hàng</label>
                            <input id="address" formControlName="address" type="text" 
                                   class="form-control border-0 bg-light rounded-0 shadow-none fs-6" 
                                   placeholder="123 Nam Kỳ Khởi Nghĩa, Quận 3..." required>
                        </div>

                        <button type="submit" [disabled]="registerForm.invalid || loading"
                                class="btn btn-primary w-100 py-3 text-uppercase letter-spacing-wide fw-bold shadow-sm">
                            {{ loading ? 'Đang khởi tạo...' : 'Đăng Ký Tài Khoản' }}
                        </button>

                        <p class="text-center text-muted small mt-4 mb-0">
                            Bằng việc đăng ký, bạn đồng ý với 
                            <a href="#" class="text-dark fw-bold text-decoration-none">Điều khoản</a> & 
                            <a href="#" class="text-dark fw-bold text-decoration-none">Chính sách</a> của chúng tôi.
                        </p>
                    </form>

                    <div class="text-center mt-5">
                        <p class="small text-muted mb-0">Bạn đã có tài khoản?</p>
                        <a routerLink="/login" class="text-dark fw-bold text-decoration-none border-bottom border-dark pb-1 small">ĐĂNG NHẬP NGAY</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
