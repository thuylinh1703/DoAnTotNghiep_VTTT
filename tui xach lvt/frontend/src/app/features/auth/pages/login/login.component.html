<section class="bg-light d-flex align-items-center justify-content-center py-5" style="min-height: 80vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card border-0 shadow-sm p-4 p-md-5 rounded-0">
                    <div class="text-center mb-5">
                        <div class="bg-dark text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-4" style="width: 48px; height: 48px; font-size: 20px; font-weight: 700;">L</div>
                        <h1 class="display-font fs-2 mb-2">Đăng Nhập</h1>
                        <p class="text-muted small letter-spacing-wide text-uppercase">Chào mừng bạn quay lại</p>
                    </div>

                    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                        <div *ngIf="errorMessage" class="alert alert-danger border-0 rounded-0 small mb-4">
                            <i class="bi bi-exclamation-triangle me-2"></i> {{ errorMessage }}
                        </div>

                        <div class="mb-4">
                            <label for="email-address" class="form-label small text-uppercase tracking-widest text-muted fw-bold" style="font-size: 0.7rem;">Địa chỉ Email</label>
                            <input id="email-address" formControlName="email" type="email" 
                                   class="form-control form-control-lg border-0 bg-light rounded-0 shadow-none fs-6" 
                                   placeholder="example@gmail.com" required>
                        </div>

                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <label for="password" class="form-label small text-uppercase tracking-widest text-muted fw-bold mb-0" style="font-size: 0.7rem;">Mật khẩu</label>
                                <a routerLink="/forgot-password" class="text-gold text-decoration-none small fw-bold" style="font-size: 0.75rem;">Quên mật khẩu?</a>
                            </div>
                            <input id="password" formControlName="password" type="password" 
                                   class="form-control form-control-lg border-0 bg-light rounded-0 shadow-none fs-6" 
                                   placeholder="••••••••" required>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input rounded-0 shadow-none border-secondary" type="checkbox" id="rememberMe">
                            <label class="form-check-label small text-muted" for="rememberMe">Ghi nhớ đăng nhập</label>
                        </div>

                        <button type="submit" [disabled]="loginForm.invalid || loading"
                                class="btn btn-primary w-100 py-3 text-uppercase letter-spacing-wide fw-bold shadow-sm">
                            {{ loading ? 'Đang xác thực...' : 'Đăng Nhập' }}
                        </button>
                    </form>

                    <div class="text-center mt-5">
                        <p class="small text-muted mb-0">Bạn chưa có tài khoản?</p>
                        <a routerLink="/register" class="text-dark fw-bold text-decoration-none border-bottom border-dark pb-1 small">ĐĂNG KÝ NGAY</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
