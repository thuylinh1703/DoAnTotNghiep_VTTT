services:

  # ─────────────── MySQL ───────────────
  mysql:
    image: mysql:8.0
    container_name: tuixach_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tuixach_lvt
      MYSQL_USER: tuixach
      MYSQL_PASSWORD: tuixach123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────── RabbitMQ ───────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: tuixach_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────── Redis ───────────────
  redis:
    image: redis:7.2-alpine
    container_name: tuixach_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─────────────── Backend ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tuixach_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────── Frontend ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tuixach_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  rabbitmq_data:
  redis_data:
  uploads_data:
